name: CI

on:
  pull_request:
    branches: ['**']
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build and deploy'
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest

  dusk-tests:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    services:
      chromedriver:
        image: selenium/standalone-chrome:latest
        options: >-
          --health-cmd "curl http://127.0.0.1:4444/status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 4444:4444

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Directory permissions
        run: sudo chmod -R 777 storage bootstrap/cache

      - name: Create database
        run: mkdir -p database && touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Build assets
        run: npm run build

      - name: Detect host IP
        id: host-ip
        run: |
          HOST_IP=$(hostname -I | awk '{print $1}')
          echo "ip=${HOST_IP}" >> "$GITHUB_OUTPUT"

      - name: Start Laravel server
        run: php artisan serve --host=0.0.0.0 --port=8000 &
        env:
          APP_URL: http://${{ steps.host-ip.outputs.ip }}:8000
          SESSION_DRIVER: file
          CACHE_STORE: file

      - name: Wait for server
        run: |
          LOOPS=10
          until curl --max-time 5 -sf http://${{ steps.host-ip.outputs.ip }}:8000; do
            if [ $LOOPS -eq 0 ]; then
              echo "Server failed to start"
              cat storage/logs/laravel.log 2>/dev/null || true
              exit 1
            fi
            sleep 3
            LOOPS=$((LOOPS-1))
            echo "Waiting for server... ($LOOPS attempts remaining)"
          done

      - name: Run Dusk tests
        run: php artisan dusk
        env:
          APP_URL: http://${{ steps.host-ip.outputs.ip }}:8000
          DUSK_DRIVER_URL: http://localhost:4444
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
          SESSION_DRIVER: file
          CACHE_STORE: file

  build-and-push:
    needs: [test, dusk-tests]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }},enable=${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }},enable=${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/v') }}
            type=sha
            type=raw,value=latest,enable=${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=staging,enable=${{ github.event_name == 'pull_request' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ inputs.tag || github.ref_name }}
            APP_PR_NUMBER=${{ github.event.pull_request.number }}
            APP_BRANCH=${{ github.head_ref }}

  deploy-staging:
    needs: build-and-push
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: firth.water.gkhs.net
          username: sprouter
          key: ${{ secrets.FIRTH_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/docker/sprouter-staging
            timeout 300 docker compose pull || {
              echo "ERROR: docker compose pull failed or timed out after 300s"
              exit 1
            }
            docker compose up -d || {
              echo "ERROR: docker compose up -d failed"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            }
            for i in $(seq 1 30); do
              if docker compose exec -T app php artisan --version > /dev/null 2>&1; then
                echo "Container ready after ${i} attempt(s)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Container failed to become ready after 30 attempts"
                docker compose logs --tail=50 app
                exit 1
              fi
              echo "Attempt ${i}/30: container not ready, waiting..."
              sleep 2
            done
            rm -rf public/build/assets && mkdir -p public/build && docker compose cp app:/var/www/html/public/build/assets public/build/
            docker compose exec -T app php artisan migrate --force || {
              echo "ERROR: Migration failed"
              docker compose exec -T app php artisan migrate:status || true
              exit 1
            }

  deploy-production:
    needs: build-and-push
    if: inputs.tag != ''
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Deploy production
        uses: appleboy/ssh-action@v1
        with:
          host: firth.water.gkhs.net
          username: sprouter
          key: ${{ secrets.FIRTH_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/docker/sprouter
            timeout 300 docker compose pull || {
              echo "ERROR: docker compose pull failed or timed out after 300s"
              exit 1
            }
            docker compose up -d || {
              echo "ERROR: docker compose up -d failed"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            }
            for i in $(seq 1 30); do
              if docker compose exec -T app php artisan --version > /dev/null 2>&1; then
                echo "Container ready after ${i} attempt(s)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Container failed to become ready after 30 attempts"
                docker compose logs --tail=50 app
                exit 1
              fi
              echo "Attempt ${i}/30: container not ready, waiting..."
              sleep 2
            done
            rm -rf public/build/assets && mkdir -p public/build && docker compose cp app:/var/www/html/public/build/assets public/build/
            docker compose exec -T app php artisan migrate --force || {
              echo "ERROR: Migration failed"
              docker compose exec -T app php artisan migrate:status || true
              exit 1
            }
