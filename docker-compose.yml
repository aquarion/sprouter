services:
  app:
    build: .
    ports:
      - "${OCTANE_PORT:-8000}:${OCTANE_PORT:-8000}"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage:/app/storage
    restart: unless-stopped

  mysql:
    image: mysql:8.0.46
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sprouter}
      MYSQL_USER: ${DB_USERNAME:-sprouter}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4.9-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  storage:
  mysql_data:
  redis_data:
